<!--
  Correo: Recordatorio de evento (plantilla genérica)
  Asunto sugerido: Recordatorio — {{EVENT_TITLE}} · {{EVENT_DATE}}

  Reemplaza:
  - {{SITE_URL}}
  - {{EVENT_TITLE}}
  - {{EVENT_DATE}}
  - {{EVENT_TIME}}
  - {{EVENT_VENUE}}
  - {{EVENT_IMAGE}}
  - {{MEETUP_URL}}
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recordatorio de evento</title>
  <style>
    @font-face {
      font-family: 'Amazon Ember';
      src: url('https://aws-sbg-resources.s3.us-east-1.amazonaws.com/Fonts/AmazonEmberDisplay_Rg.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Amazon Ember';
      src: url('https://aws-sbg-resources.s3.us-east-1.amazonaws.com/Fonts/AmazonEmberDisplay_Bd.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    body, table, td, p, a { font-family: 'Amazon Ember', Arial, Helvetica, sans-serif; }
    h1 { font-family: 'Amazon Ember Display', Arial, Helvetica, sans-serif; font-weight: 300; }
    @media only screen and (max-width: 620px) {
      .wrapper { width: 100% !important; }
      .px { padding-left: 20px !important; padding-right: 20px !important; }
      .hero-img { width: 100% !important; height: auto !important; }
      .btn { display: block !important; width: 100% !important; box-sizing: border-box !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#000000;color:#ffffff;">
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">
    Te recordamos: {{EVENT_TITLE}} — {{EVENT_DATE}}
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#000000;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" class="wrapper" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

          <tr>
            <td class="px" style="padding:0 32px 24px;text-align:center;">
              <img src="{{SITE_URL}}/brand/logo.svg" alt="AWS SBG UPY" width="64" height="64" style="display:block;margin:0 auto;border:0;" />
            </td>
          </tr>

          <tr>
            <td class="px" style="padding:0 32px 20px;">
              <p style="margin:0 0 8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#C4B5E0;">Recordatorio</p>
              <h1 style="margin:0;font-size:26px;line-height:1.3;color:#ffffff;font-weight:300;">{{EVENT_TITLE}}</h1>
            </td>
          </tr>

          <tr>
            <td class="px" style="padding:0 32px 20px;">
              <img class="hero-img" src="{{EVENT_IMAGE}}" alt="{{EVENT_TITLE}}" width="536" style="display:block;width:100%;max-width:536px;height:auto;border-radius:12px;border:0;" />
            </td>
          </tr>

          <tr>
            <td class="px" style="padding:0 32px 24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#111111;border:1px solid #2A2A2A;border-radius:12px;">
                <tr>
                  <td style="padding:20px;font-size:15px;line-height:1.8;color:#D4D4D4;">
                    <strong style="color:#ffffff;">📆 Fecha:</strong> {{EVENT_DATE}}<br />
                    <strong style="color:#ffffff;">🕙 Hora:</strong> {{EVENT_TIME}}<br />
                    <strong style="color:#ffffff;">📍 Lugar:</strong> {{EVENT_VENUE}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td class="px" style="padding:0 32px 32px;text-align:center;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center">
                <tr>
                  <td style="border-radius:8px;background-color:#190B2C;">
                    <a class="btn" href="{{MEETUP_URL}}" style="display:inline-block;padding:14px 32px;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:8px;">
                      Ver detalles del evento
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td class="px" style="padding:24px 32px;border-top:1px solid #2A2A2A;text-align:center;">
              <p style="margin:0 0 8px;font-size:12px;color:#737373;">© 2026 AWS Student Builder Group UPY</p>
              <p style="margin:0;font-size:12px;">
                <a href="mailto:aws.sbg@upy.edu.mx" style="color:#C4B5E0;text-decoration:none;">aws.sbg@upy.edu.mx</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
